body:
  text: 垂示代語師因不安云打草鞋行腳去無對師云汝問我與汝道僧便問和尚什麼處去師云四維上下對機設教去代前語云和尚宜喫薑附湯上堂云劄久雨不晴代云一箭兩垛或云遇賤即貴遇明即暗代云一起一倒一日云咬齒一句作麼生道代云合或云初秋夏末好與三十棒代云某甲如是問僧新羅國與大唐國是同是別代云僧堂佛殿廚庫三門上堂云教意提不起過在什麼處代云為你蝦蟆活上堂云你道古佛與露柱相交是第幾機無對師云汝問我與汝道僧便問師云一條絛三十文代前語云南山起雲北山下雨僧又問作麼生是一條絛三十文師云打與一日云商量舉覺箇什麼代云鹽貴米賤或云佛法兩字拈卻成得箇什麼代云死蝦蟆或云佛法不用學燈籠露柱欺你去作麼生得不欺你去代云趙州南石橋北一日云古人面壁閉卻門還透得這裏麼代云這裏是什麼乾屎橛又云一或云般柴來去行住坐臥四威儀中還出得釋迦老子鼻孔麼代云和尚也是量才補職師或舉手云古佛為什麼不到這裏代云不可降尊就卑因僧設報慈和尚齊師問僧汝道報慈和尚有幾身代云今日齊飯如法問僧般柴來去普賢菩薩在什麼處代云般柴早是辛苦上堂大衆集定云是大過患子細點檢代云不用別人問僧世間是什麼人罪最重代云平出一日云古人道一句合頭語萬劫繫驢橛作麼生明得免此過代云趙州石橋嘉州大像或云虛空還有長短也無代云這箇師僧得與麼肥這箇師僧得與麼瘦一日云常徒之見過在什麼處代云洎作過中會上堂大衆集定云有理不伸死而不吊有理能伸罕遇奇人置將一問來代云過師有時問僧作麼生代云少喫或云是你諸人繞天下行腳不知有祖師意露柱卻知有祖師意你作麼生明得露柱知有祖師意代云九九八十一示衆云一舉不再說作麼生是一舉又云你若不相當且覓箇入頭路微塵諸佛盡在你舌頭上三藏聖教在你腳跟下不如悟去好還有人悟得麼出來道看代云養子之緣代前語云長安雖樂上堂大衆集定云風不來樹不動便下座代云樹折船沉或云第一句作麼生道若道不得作麼生得心息代云和尚莫要草鞋拄杖麼一日云從上古人作麼生辨人代云城地因君置師因摘茶云摘茶辛苦置將一問來無對又云你若道不得且念上大人更不相當且順朱代云功不浪施代前語云勞而無功或云今日二十七拈向什麼處代云壁上挂問僧三乘十二分教什麼人承當得代云沙彌童行一日云汝作麼生辨得無礙法代云間家具或云還有句內藏身麼代云領一日云京華還有棟梁也無代云家家觀世音或云不相當且順朱識取好代云因學人置得示衆云劄即難七九六十三作麼生道代云不可總無人去也又云洎合向後道師或云日裏來往日裏辨人忽然中夜教取箇物來未曾到處作麼生取代云瞞卻多少人示衆云看看佛殿入僧堂裏去也代云羅浮打鼓韶州舞上堂拈起拄杖云看看三千大千世界一時搖動便下座代云拽一日云作麼生是雙明一句代云一箭兩垛或云作麼生是不瞞人底句代云莫道這箇是瞞人底一日云泥水不分過在什麼處代云昨日莫徭人設齊或云日裏來往總識你作麼生是影身一句代云某甲亦見日頭從東邊上一日云盡力作麼生道代云五箇糊餅三碗茶或云作麼生是平伸一問代云便摑傍僧一日云空不異色作麼生道代云園頭甚要或云作麼生是不沉影底句代云現上堂大衆集師良久云久雨不晴代云一槌兩當蓋覆將來一日云教中有言謗斯經故獲罪如是拈卻當門齒將經來代云不空罥索或云你多年在叢林裏乃舉手便放下云向後不得與麼代云若與麼便成辜負和尚一日云昨日有一句語不敢望你會還有人舉得麼代云驀又云走殺多少人上堂大衆集定云總上來也各自東行西行便下座代云不少或云古人一言悟道觸緣見性拈起作麼生商量代云雲居鼓上藍鐘一日云日裏來往上上下下一問一答住汝當荷夾差一問來作麼生當荷代云謂言侵早起更有夜行人又云一起一倒又云生在冀州上堂云乾坤側日月星辰一時黑作麼生道代云好事不如無師因說事了起立以拄杖打禪床一下云適來如許多葛藤貶向什麼處去靈利底即見不靈利底著我熱瞞代云雪上加霜示衆云日月傍照三天下正照四天下我與你注破了也一句道將來代云東弗于代西瞿耶尼或云佛法不用道著世間什麼物最貴代云莫道這箇是賤底又云乾屎橛一日云今日十五入夏也寒山子作麼生代云和尚問寒山學人對拾得或云你諸人傍家行腳還識西天二十八祖麼代云坐底坐臥底臥又云少喫因齊次指白瓷器云這箇知有超佛越祖之談代云五九四十五又云和尚自喫飯一日云是你傍家行腳作麼生是不落賓主底句道將來代云便出去或云是你師僧在江西湖南所在過夏衣鉢分付什麼人了來代云不是瞞卻一人來又云不作大人相一日云非貴賤據什麼代云蝦跳不出斗示衆云看看殺了也便作倒勢云會麼若不會且向拄杖頭上會取代云龍頭蛇尾蛇尾龍頭又代作倒勢一日云我每日共你葛藤不能到夜如今在這裏置將一問來代云秪恐和尚不答或云作麼生是腳跟下一句代云有麼師或問僧你為什麼帶纍我代云某甲帶纍和尚或云作麼生出得這裏代云朝遊羅浮暮歸檀特一日云明己底人還見有己麼代云把將來又代展兩手或云作麼生是蹙舌一句代云和尚秪待某甲道一日云你師僧繞天下行腳見老和尚開口便上來東聽西聽何不向洗鉢盂處置將一問來代云也知和尚為物之故因見火頭云你辛苦我賞你這箇拄杖子吞卻祖師也無對代云功不浪施又云禍不單行師因披衲衣云古人道披衣蓋乾坤乃拈起衲衣抖擻云北斗一時黑作麼生代云也知和尚出身早又云不道與麼去或云佛法還有變易也無代云鉢盂鞋履拄杖針筒一日云佛法拈卻我不問你還有識世諦法麼代云某甲若道有被和尚領過或云摩㝹顯正過在什麼處代云有什麼過示衆云大衆函蓋乾坤目機銖兩不涉世緣作麼生承當代云一鏃破三關師或云南來北往飛禽走獸為什麼卻有異代云辨卻多少人或云你諸人擔鉢囊行腳不知有佛法佛殿上蚩吻卻知有佛法代云佛殿裏裝香三門外合掌師或以拄杖一畫云微塵諸佛盡在這裏還辨得盡麼代云日出東方夜落西一日云作麼生是扣門一句代云打或云迷本底人觸途俱滯悟本底人為什麼有四大見代云益州附子建州薑師或云你諸方愛答話還有透不得底句麼代云來或云達磨西來為什麼難得兒孫代云放師因說事了起立云你諸人忽然今夜總悟去早起將刀截卻我頭我說了也乃拈衲衣抖擻云作麼生代云學人不得辜負和尚或云口秪堪喫飯你道古人拈槌豎拂揚眉動目作麼生辨代云溈山笠子江西別又云龍頭蛇尾或云佛法中菩提涅槃真如解脫並為增語汝道世諦以何為增語代云鬧市裏一箇兩箇又云菩提涅槃師或云古人道觸目是道拈卻醬甕阿那箇是道無對師云蒼天蒼天代前語云是什麼心行或云見即不可子細看代云長安雖樂示衆云十五日已前不問你十五日已後道將一句來代云日日是好日上堂良久云鈍置殺人便下座代云不獨因看志公頌問僧半夜子心住無生即生死古人意作麼生代云不可總作野狐精見解也或云古人道人人盡有光明在看時不見暗昏昏作麼生是光明代云廚庫三門又云好事不如無一日云佛法太煞有秪是舌頭短代云長也又云大斧斫了手摩挲師齊次問僧應是從前叢林學得底言語總拈卻你道我飯作麼生滋味代云菜裏少鹽醋或云是你諸人行腳須知有隔身句作麼生是隔身句代云初三十一或云大智非明真空絶跡還有人明得這箇道理麼若有人明得出來道看代云捏問僧常徒底人過在什麼處你與我拈出來代云不可平地生堆阜又云和尚佛法身心何在或云一言才舉千差同轍是什麼言代云如是我聞又云要道有什麼難因見狗子乃打一下云你為什麼咬這露柱代云但以腳躍狗子便去舉華經云金色光明雲青色光明雲你道我尋常還有這箇時節麼代云亦不得屈著和尚因開法堂門云作麼生是入門一句有僧云喏師云漆桶無對代云掩面出去代後語云道著一日衆集定云莫錯認一著便下座代云謝和尚重重相為或云是你諸人行腳須知有入頭路還有人道得麼出來道看代云也不得辜負和尚示衆云中有一寶祕在形山拈燈籠向佛殿裏將三門來燈籠上作麼生代云逐物意移又云雷起雲興一日云宗門作麼生舉令代云吽師或云阿耶耶新羅國裏打鐵火星燒著我指頭自代云非但指頭師或云從上祖師三世諸佛說法山河大地草木為什麼不省去代云新到行人事又云和尚京中喫麵多師或云萬法紜紜三世諸佛天下老和尚一時出頭過在什麼處代云著什麼來由一日云忽然有一箇老宿把弓刀按劍入地獄如箭射還有人會得這箇時節麼代云鑰匙在和尚手裏或云古人道難得不錯怪人句作麼生是不錯怪人句代云爭塞得人口一日云眼睫橫亙十方眉毛上透乾坤下透黃泉須彌塞卻你咽喉還有人會得麼若有人會得拽取占波共新羅鬥額代云哂或云古人道聲香味觸常三昧我與你葛藤乃拈拄杖云這箇拄杖子是三昧你若識得拄杖子即識得天下老宿又云你若識得拄杖子未夢見天下老宿腳跟下一莖毛代云和尚不使別人一日云一箭兩垛作麼生代云長安雖樂或云日謝樹無影這箇是佛殿那箇是無影代云洎分南北一日云作麼生道得不落第二問代云洪州鞋履一日拈起拄杖云解脫深坑勃跳代云出或云一語明得不要分外代云將謂是天地師或云塵無自性攬真成立作麼生是成立底事代云五尺拄杖三尺竹一日云說即天地懸殊不說即眼睫裏藏身眉毛上勃跳代云三三或云古人道一語無二語作麼生是一語代云早朝粥齊後茶師或拈起拄杖云是你諸人作麼生辨雲門雲門作麼生辨你諸人代云平問僧佛法還有青黃赤白也無代云東方甲乙木西方庚辛金一日云作麼生是塵中辨主代云道州去江華不遠師或云有一人問著口似木𣔻有一人問著口似懸河你道二人過在甚處代云有過即拈出示衆云叢林言話即不要作麼生是宗門自己代云但展兩手或云迷身一句作麼生道代云何處有也或云目前不溺作麼生道代云下不舉上示衆云江西即說君臣父子湖南即說他不與麼我此間總不如是你還識壁麼代云何異一日云作麼生是不續再問代云秋風過去春風至因齊時聞鼓聲師云釋迦老子叫喚也時有僧問未審釋迦老子叫喚作麼師云你與麼驢年夢見麼代云今日喫飯甚是遲或云我今年老七十八也所作事難也良久問僧你道淨瓶年多少無對代云甲子會一日云靈利底人難得作麼生是靈利底人代云不妨或云問一答十問十答百底人從什麼處來代云西京來一日云會佛法底人共什麼人語話代云行者問僧云三藏聖教天下老和尚言語總拈卻蝦蟆口裏道將一句來代云昨日新雷起師舉古人道讀經千遍紙上見經不識忽然國師問你作麼生又云忽然國師拈起作麼生代前語云唵代後語云朝看華嚴夜讀般若或云凡有請問不得離於祗對作麼生道代云路逢劍客須呈劍一日云作麼生是一句通褒貶代云雖是善因而招惡果或云行住坐臥著衣喫飯是法身那箇是你四大代云和尚今年年尊一日云你若辨我我辨你是尋常更有一條作麼生辨代云識或云節角語須是箇人始得作麼生是節角語代云摩斯吒落水一日云繞天下行腳辨人底人你道具什麼眼代云聽水上堂云遇人即鼻孔遼天便下座代云識好惡師或云鬧市裏道將一句來代便唱聲云人家莫點燈火上堂云為衆竭力禍出私門代云衆禍已除或云照盡一句作麼生道代云某甲不欲開蝦蟆口師在糊餅寮喫茶云不向汝道罪過無對復云第一須忌火便起去代云大衆不得辜負和尚師或云佛法太煞有秪是灸瘡痛代云灸瘡痛猶可一日云臨坑不損人代云也是又云某甲識好惡或云古人道舉即易作麼生代云以貌取人一日云驀點是什麼時節代云不可道是蝦蟆蛤跛或云不是雲門罪過便起去代云事不孤起師或云己事若明始消他供養作麼生是你明底事又云舉一明三萬里崖州代云一切由和尚代前語云飽師或拈起拄杖問僧這箇汝不得道著作麼生是衲僧孔竅無對又云你若道不得向鼻孔裏道將一句來代云新羅火鐵鄆州針又云匹上不足因僧來參師拈起袈裟云你若道得落我袈裟綣繢裏你若道不得又在鬼窟裏坐作麼生代云某甲無氣力或云不明己底人過在什麼處代云大人不合如此一日云放下一句無不盡代云養子之緣或云不用指東劃西什麼人會佛法代云三家村裏老翁婆一日云你若衣鉢下坐縛殺你你若走上來走殺你作麼生是不停之句代云速或云新羅國裏置將一問來代云便請一日云萬法從甚處起代云糞堆頭師或云第一句作麼生道你若明得陝府鐵牛吞卻乾坤代云謝和尚重重相為一日云作麼生是問中具眼代云瞽示衆云舉一不得舉二你若舉二放你舉三代云開師或云天堂地獄鑊湯爐炭蓋卻你頭三世諸佛總在你腳跟下三十年後鼻孔遼天代云不可更作野狐精見解也一日云五音六律是有是無代云不可蝦蟆窟裏作活計師或云一句該通五千餘首蘇嚕薩訶代云三門頭打鼓佛殿裏行香師或云如今半夏也敲磕處道將一句來師復云密怛哩孤密怛哩智又云密怛哩孤密怛哩智作麼生代云𭊘啉又云磕一日云三十年後會去在代云點兒落節或云頭上霹靂即不問你腳下龍過道將一句來代云朝起雲夜降雨師問僧德山便棒你道學人還有長處也無代云無端一日云一切智智清淨中還有生滅麼代云夜叉說半偈或云若知去處什麼劫中無祖佛代云發示衆云作麼生是不露鋒骨句代云今時人須是明明向道始得師乃有頌不露鋒骨句未語先分付進步口喃喃知君大罔措或云十方國土中唯有一乘法你道自己在一乘法裏一乘法外代云入又云是一日云紐半破三針筒鼻孔裏道將一句來代云海裏使風山上船或云折半列三針筒鼻孔在什麼處與我箇箇拈出來看代云上中下或云分疆列土作麼生道代云文殊自文殊解脫自解脫師或云衲僧須得巴鼻即識得天下人作麼生是衲僧巴鼻代云德山棒示衆云淺聞即深悟深聞即不悟代云迷逢達磨或云衲僧須識古人眼作麼生是古人眼代云蝦蟆跳上天一日云處處道將一句來代云鬧市裏天子百草頭上老僧或云暗道將一句來代云藏頭露尾一日云將南作北將北作南作麼生道代云由阿誰或云未打板已前道將一句來代云著什麼來由一日云以有為有作麼生免得去代云患師或云解患非患明得了作麼生是眼代云晝見日夜見星一日云明暗為什麼不相管代云難為怪笑或云過在什麼處得與麼難代云辨一日云渺漫不分是什麼人分上事代云不可作沙彌行者見解也師或拈起拄杖云莫道老和尚瞞你貴之與賤縱橫十字一時這裏會得了莫辜負老僧代云百鳥為子屈又云抑與之與師或云見麼自云見又云見什麼代云花師舉古人云至道無難唯嫌揀擇這箇是僧堂這箇是佛殿那箇是不揀擇代云何必如此師或云全抽半抽作麼生道復云作麼生是半抽代云跳出死蝦蟆又云作麼生是全抽代云案山雷主山雨師或云你自鈍置第一不得錯舉代云事不孤起一日云識得道得出來道看話端道什麼代云識罪或云作麼生是不再問底句代云今年春氣早夜來陽鳥啼又云佛殿裏裝香三門前合掌一日云入夏來十一日也還得入頭麼作麼生道代云來日十二師因喫茶拈起茶盞云一口吞盡作麼生代云茶又喫卻示衆云西天二十八祖唐土六祖天下老和尚總出頭來過在什麼處又云你在此間三冬兩夏忽然出外有人問雲門老和尚道什麼你向他道什麼代云驀面唾這野狐精代前語云他不是顛或云古人道從門入者非寶作麼生是門代云道得也無用處因聞鼓聲云鼓聲咬破七條又指僧云抱取貓兒來代云不用別人師問僧行腳事即不問汝三十二相八十種好道將一句來還有人道得麼代云怛薩阿竭二千年師或云不問汝叢林言教這箇是天這箇是地以手指身云這箇是我又指露柱云這箇是露柱那箇是佛法代云也大難師在僧堂中喫茶拈起托子云蒸餅饅頭一任汝喫你道這箇是什麼代云乾狗屎又云茶又喫了也師或云你還識德山麼莫道我壓良為賤代云也知和尚因某甲置得師聞齊鼓聲云你道鼓因什麼置得代云因皮置得師聞齊鼓聲云你還識得老婆禪麼代云鼓聲喚喫飯去一日云古人道巧拙具生殺作麼生是生殺代云匹上不足匹下有餘上堂大衆集已師云大衆齊去卻問僧你道我教伊去還有過也無代云也不是和尚特地如此師行次以拄杖打露柱一下云新羅天子勃跳上梵天代云無端師或云世諦不要道佛法道將一句來代云父子之情一日云通明底人什麼物與麼來代云莫教屈著人又云釋迦老子須彌山或云古人道朝朝抱佛眠起時還共起你道見解朦朧底人作麼生代云未到問僧云眼中無色識識中無色眼色眼二俱無何能令見色去卻古人道將一句來代云把將饅頭蒸餅來又云雪上更加霜又云有什麼師或云幡竿頭倒卓是第幾機代云打一日云學佛法底人如恆河沙百草頭上道將一句來代云俱師因出門云古人道從門入者非寶汝道從門出者作麼生代云一師入堂齊次指聖僧供鉢問僧云你若喫盡又在解脫深坑裏你若喫不盡又不唧𠺕作麼生代云大衆喫飯次上堂云劃斷即不可復云你若不會三十年後莫道不見老僧代云和尚恐人埋沒代前語云今日上堂大衆著便師或以柱杖打露柱一下云你作麼生不說禪復云埋沒人家男女無對自云擔枷過狀自代前語云爭怪得別人師或云湖裏魚變成龍即不問你作麼生是針眼魚代云點師聞打槌聲云妙喜世界百雜碎擎鉢盂向湖南城裏喫粥代云浴後喫一日云什麼語中無世諦什麼語中無地獄代云天晴日出雨下雷興或云平常心是道你平常道將一句來代云五箇糊餅三箇䭔一日云一句辨邪正忽有人問作麼生是辨邪正底句你作麼生道代云西天與此土不同或云今日已前不要今日已後不要正當今日道將一句來代云正好師或云病遇因即瘥你道遇什麼因道得底道看代云尚或云鉢盂匙箸與露柱相去多少代云分開好又云尋常得此便一日云當鋒一句作麼生道代云領或云作麼生是辨慈風一句代云識取好一日云迷身一句作麼生道代云昨日雷聲起今朝陽鳥啼師或云不用勃跳道將一句來代云死蛤跛也無用處一日云作麼生是提婆宗代云西天令嚴此土還較或云汝道何物具四德代云死貓兒又云把不具底來一日云荊棘不雕擇道將一句來代云拈放一邊或云有一切見底人是什麼人代云三家村裏納稅漢一日云不占田地道將一句來代云總屬和尚或云倒道將一句來看代云訶薩一日云息節一句作麼生道代云知時好師或云天下難走將什麼過水代云且曬著師或時拈拄杖作射勢云官家進器械來也看看代云和尚不得放過又云僧堂前師或云一夜展腳睡天明道將一句來代云何不快起或云作麼生是赤脫一句代云也大無端一日云以有為有此人過在什麼處代云苦或云還有不識祖師底人麼代云仁義道中又云不患一日云識過無過不識過過也不知代云熱或云曹溪路上還有俗談也無代云二事一時一日云佛法外置將一問來代云一箇便多或云既知來處什麼劫中無祖師代云某甲今年不著便或云寸草不生不學禪不學道代云是什麼間或云還有吞不盡句麼代云蛇師行次以拄杖打露柱一下云什麼處來自云西天來復云來這裏作什麼自云說佛法乃喝云欺我唐土人又以拄杖打一下便行卻拈問僧汝道我意作麼生僧便問秪如師意作麼生代云不用行主又云師子咬人復問僧秪如當機合下得什麼語代云發又云百歲老兒作歌舞一日云驀劄一句作麼生道代云因一事長一智或云大藏教將什麼辨代云點一日云佛殿為什麼不見僧堂代云痛或云衲僧鼻孔即不問汝泥裏洗玉塊道將一句來代云彈指又云衲僧鼻孔又作麼生道代云玩山玩水師或問僧作麼生是不寂句無對師云汝問我與汝道僧便問作麼生是不寂句師云𭊘代前語云不可向鬼窟裏作活計又云作麼生是𭊘代云會此意又云文殊五字或云作麼生是入鄉隨俗底句代云君子可入一日云作麼生是提綱一句代云雪峰南趙州北一日云靈苗不動根過在什麼處代云誤卻多少人或云一顆圓光明已久作麼生是一顆圓光代云謝和尚重重相為師或云作麼生是對明一句代云露師或云非色非聲體上明得是第幾機代云不可向野狐窟裏作活計一日云布幔天網打龍布絲網撈蝦摝蜆你道螺蚌落在什麼處代云具眼師因卸卻七條語僧云汝道來生莫不會佛法麼僧無語代云和尚幸是大人又云某甲不敢道復云為什麼不敢道又云自有和尚在師歲夜問僧餅餤是羅漢藥石還將得饆饠䭔子來麼無對代云今日東風起師或云你若不相當且向古人建化門中道將一句來若道不得向異處道將一句來作麼生道代云前來猶是可一日云遠即照近即明作麼生道代云入水始見長人又云更不要也師或拈拄杖云且向這裏會也有利益也無利益總不會顢頇佛性儱侗真如代云匹上不足匹下有餘一日云萬法從什處起代云不可向和尚道蝦蟆口裏也因齊時聞鼓聲云古人道一切聲是佛聲喚作佛聲喚作鼓聲代云和尚道了也又云和尚不宜喫麵因見僧來參師打露柱一下云來這裏瞞我代云但打露柱一摑云為人自安一日云至道無難唯嫌揀擇作麼生是不揀擇又云如來妙色身羅羅李代云不出代前語云古人道了也因齊時打帳座一下云這箇喫又打飯床一下云這箇不喫代云一槌兩當因搬米問僧人擔米米擔人代云總得又云搬米辛苦猶是可又問僧大橋有多少米僧云七十碩師拈起拄杖云七十碩米一時在拄杖頭上擔將來即得若擔不得餓殺你代云不可為小小一日云有所說野干鳴無所說師子吼我與麼是野干鳴作麼生是師子吼代云九九八十一師或云埋沒兩字不用道著代云深領和尚慈悲又云因某甲所置師或云善財入門也作麼生道得出去代云朝遊羅浮師或云糊餅從你橫咬豎咬不離這裏道將一句來代云今日新麵一日云有賞有罰道將一句來代云遇賤即貴天晴日出或云龍潛師溺起自何來作麼生是不活底句代云有什麼難辨一日云敲磕一句作麼生道代云驢生馲𩢷馬生騾或云作麼生得道斷商量代云來年更有新條在惱亂春風卒未休一日云辨得親疏為什麼被親疏所使代云阿誰置得或云古人道會即途中受用不會即世諦流布完圞道將一句來代云一錢兩箇二錢三箇一日云一句道將來代云匹上不足因夏末問僧初秋夏末不觸平常道將一句來代云初三十一中九下七師問僧通身是水阿誰喫代云洎與和尚作笑具
