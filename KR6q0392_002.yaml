body:
  text: 室中語要舉古云聞聲悟道見色明心師云作麼生是聞聲悟道見色明心乃云觀世音菩薩將錢來買糊餅放下手云元來秪是饅頭有時云燈籠是你自己把鉢盂噇飯飯不是你自己有僧便問飯是自己時如何師云者野狐精三家村裏漢復云來來不是你道飯是自己僧云是師云驢年夢見三家村裏漢有時云真空不壞有真空不異色僧便問作麼生是真空師云還聞鐘聲麼僧云此是鐘聲師云驢年夢見麼舉疏山和尚問僧什麼處來僧云嶺中來山云曾到雪峰麼僧云曾到山云我已前到時是事不足如今作麼生僧云如今足也山云粥足飯足僧無語師云粥足飯足舉孚上座參雪峰峰聞乃集衆孚到法堂上顧視雪峰便下看知事明日卻上禮拜云某甲昨日觸忤和尚峰云知是般事便休時有僧問師作麼生是觸忤和尚處師便打舉僧問資福古人拈槌豎拂意旨如何福云古人與麼那僧云拈槌豎拂又作麼生福便喝出師云古人是什麼眼目僧云和尚作麼生師云驢年會麼僧無對師復召僧來來僧近前師以拂子驀口打舉三平頌云即此見聞非見聞師云喚什麼作見聞無餘聲色可呈君師云有什麼口頭聲色箇中若了全無事師云有什麼事體用無妨分不分師云語是體體是語復拈起拄杖云拄杖是體燈籠是用是分不分不見道一切智智清淨舉一宿覺云幻化空身即法身師拈起拄杖云盡大地不是法身舉僧問趙州某甲乍入叢林乞師指示州云喫粥了也未僧云喫粥了也州云洗鉢盂去師云且道有指示無指示若道有指示向他道什麼若道無指示者僧何得悟去舉僧問雪峰乞師指示峰云是什麼其僧於言下大悟師云雪峰向伊道什麼有時云平地上死人無數過得荊棘林是好手僧云與麼則堂中第一座有長處也師云蘇嚕蘇嚕舉無情説法忽聞鐘聲云釋迦老子説法也驀拈起拄杖問僧者箇是什麼僧云拄杖子師云驢年夢見一日云三家村裏賣卜東卜西卜忽然卜著也不定僧便問忽然卜著時如何師云伏惟師有時云大用現前不存軌則僧便問如何是大用現前師乃拈拄杖高聲唱云釋迦老子來也有時以拄杖打火爐一下大衆眼目定動師乃云火爐勃跳上三十三天見麼見麼衆無語師云無智人前莫説打你頭破百裂師有時云看看法身變作燈籠超佛越祖之談從你腳跟下過也僧云腳跟下認得時如何師云鈍置殺我僧云與麼則迥然不在者裏也師云十萬八千舉槃山語云光境俱忘復是何物師云直饒與麼道猶在半途未是透脫一路僧便問如何是透脫一路師云天台華頂趙州石橋舉仰山云如來禪即許師兄會僧便問如何是如來禪師云上大人又拈起扇子云我喚作扇子你喚作什麼僧無語師云扇子上説法燈籠裏藏身作麼生僧卻問如何是和尚禪師叱云元來秪在者裏舉雪峰喚僧近前來僧近前峰云去師舉了問僧你作麼生道得叉手句你若道得叉手句即見雪峰舉三祖云一心不生萬法無咎師云秪者裏悟了乃拈起拄杖云乾坤大地有什麼過舉一宿覺云一切數句非數句與吾靈覺何交涉師云行住坐臥不是靈覺喚什麼作數句舉槃山云光境俱忘復是何物師云東海裏藏身須彌山上走馬復以拄杖打床一下大衆眼目定動乃拈拄杖趁散云將謂靈利者漆桶舉僧問乾峰十方薄伽梵一路涅槃門未審路頭在什麼處峰以拄杖劃云在者裏師拈起扇子云扇子勃跳上三十三天築著帝釋鼻孔東海鯉魚打一棒雨似盆傾相似會麼師有時云諸方拈槌豎拂云會麼但云莫壓良為賤卻云是是待伊擬議便打舉教云心生種種法生心滅種種法滅乃拈起拄杖云重多少僧云半斤師云驢年夢見舉夾山語云百草頭上薦取老僧師合掌云不審不審又以柱杖指露柱云夾山變作露柱也看看舉仰山問僧近離甚處僧云向南山拈起拄杖云彼中還説者箇麼僧云不説山云不説者箇還説那箇麼僧云不説山召大德參堂去其僧便去山復召其僧僧應喏山云近前來僧近前山便打師云仰山若無後語爭識得人舉雪峰喚僧近前來僧近前峰云甚處去僧云普請去峰云去師云此是隨語識人舉參同契云回互不回互師云作麼生是不回互乃以手指板頭云者箇是板頭作麼生是回互師云喚什麼作板頭舉見聞覺知無障礙聲香味觸常三昧師云一切處不是三昧行時不是三昧有處云聲香味觸體在一邊聲香味觸在一邊見解偏枯舉夾山坐次洞山到來云作麼生夾山云秪與麼師代洞山云不放過又作麼生代夾山便喝師又拈夾山云秪與麼元來秪在蝦蟆窟裏又云秪與麼也難得舉祖師偈云法法本來法師云行住坐臥不是本來法一切處不是本來法秪如山河大地與你日夕著衣喫飯有什麼過又云法本法無法師拈起拄杖云不是本無法舉傅大士頌云空手把鋤頭步行騎水牛師云是你從向北騎一頭水牯牛到這裏乃拈起拄杖云不見道千頭到這裏但識取一頭舉寶公云如我身空諸法空千品萬類悉皆同師云你立不見立行不見行四大五蘊不可得何處見有山河大地來是你每日把鉢盂噇飯喚什麼作飯何處更有一粒米來舉一切聲是佛聲一切色是佛色師拈起拂子云是什麼若道是拂子三家村裏老婆禪也不會舉南方禪客問國師此間佛法如何國師云身心一如身外無餘師云山河大地何處有也有時云要識祖師麼以拄杖指云祖師在你頭上勃跳要識祖師眼睛麼在你腳跟下又云這箇是祭鬼神茶飯然雖如此鬼神也無厭足師有時云若説菩提涅槃真如解脫是燒楓香供養你若説佛説祖是燒黃熟香供養你若説超佛越祖之談是燒瓶香供養你歸依佛法僧下去師一日拈起拄杖舉教云凡夫實謂之有二乘析謂之無緣覺謂之幻有菩薩當體即空乃云衲僧見拄杖但喚作拄杖行但行坐但坐總不得動著舉夾山語云百草頭上薦取老僧鬧市裏識取天子又云一塵才起大地全收舉雪峰云三世諸佛向火焰上轉大法輪師云火焰為三世諸佛説法三世諸佛立地聽師因喫茶了拈起盞子云三世諸佛聽法了盡鑽從盞子底下去也見麼見麼若不會且向多年曆日裏會取舉槃山語云光非照境境亦非存光境俱忘復是何物師云盡大地是光喚什麼作自己你若識得光去境亦不可得有什麼屎光境光既不可得境復是何物又云此是古人慈悲之故重話會語者裏倜儻分明去放過即不可若不放過復舉手云蘇盧蘇盧舉傅大士云禪河隨浪靜定水逐波清師拈拄杖指燈籠云還見麼若言見是破凡夫若言不見有一雙眼在你作麼生會良久復拈拄杖云盡大地不是浪師有時拈拄杖打床一下云一切聲是佛聲一切色是佛色你把鉢盂噇飯時有箇鉢盂見行時有箇行見坐時有箇坐見者般底作與麼去就把棒一時趁散有時拈起拂子云者裏得箇入處去捏怪也日本國裏説禪三十三天有箇人出來喚云吽吽特庫兒擔枷過狀舉古人道一處不通兩處失功兩處不通觸途成滯拈起拄杖云山河大地三世諸佛盡在拄杖頭上有甚滯礙如今明也暗向什麼處去秪者明便是暗一切衆生秪被色空明暗隔礙便見有生滅之法舉一宿覺云六般神用空不空一顆圓光色非色師拈起拂子云者箇是圓光是色非色喚什麼作色與我拈將來看舉夾山云百草頭上薦取老僧鬧市裏識取天子師云蝦蟆入你耳朵裏毒蛇穿你眼睛中且向葛藤處會取舉十方薄伽梵一路涅槃門師云你若不識大食國裏人在你眼睫裏賣香藥舉般若經云無二無二分無別無斷故師乃指露柱云與般若經相去多少舉經云經書咒術一切文字語言皆與實相不相違背師拈拄杖云者箇是什麼若道是拄杖入地獄不是拄杖是什麼師一日拈拂子摵一下云日月星辰撲落地上見麼良久起身云近後突著你眼睛舉十方薄伽梵一路涅槃門師云者箇是屋上頭是天手裏是拄杖作麼生是涅槃門有時云彈指謦咳揚眉瞬目拈槌豎拂或即圓相盡是撩鉤搭索佛法兩字未曾道著道著即撒屎撒尿舉瓦官參德山瓦官為侍者同入山斫木德山將一碗水與瓦官官接得便喫卻山云會麼官云不會山又將一碗水與瓦官官接得又喫卻山云會麼官云不會山云何不成褫取那不會底官云不會又成褫個什麼山云子大似箇鐵橛瓦官住院後雪峰去訪茶話次峰云當時在德山會裏斫木因緣作麼生官云先師當時肯我峰云和尚離先師太早其時面前有一碗水峰云將水來官便過與雪峰峰接得便潑卻師代云莫壓良為賤因齋次將糊餅一咬云咬著帝釋鼻孔帝釋害痛復以拄杖指云在你諸人腳跟下變作釋迦老子見麼見麼閻羅聞説呵呵大笑云者箇師僧相當去閻王不奈你何若不相當總在我手裏師有時以拄杖打床一下云你若是箇漢忽然者裏聞聲悟了一切山河大地日月星辰有什麼過舉洛浦云一塵才起大地全收師云鳥窠拈布毛便有人悟去因喫茶次舉一宿覺云三身四智體中圓八解六通心地印師云喫茶時不是心地印乃拈拄杖云且向者裏會取舉僧問雪峰如何是觸目菩提峰云好箇露柱有處云還見露柱麼師拈起拄杖云有底體上會事見露柱秪喚作露柱有處道不見有露柱見解偏枯見露柱但喚作露柱見柱杖但喚作柱杖有什麼過舉僧問靈雲佛未出世時如何靈雲豎起拂子僧云出世後如何雲亦豎拂子師云前頭卻實後底打不著又云不説出不出何處有一問時節秪如雪峰夏末於僧堂前坐衆才集峰拈起拄杖云者箇為中下根人便有僧問忽遇上上人來時如何峰拈起拄杖師云我不似雪峰打破狼籍僧便問未審和尚如何師便打舉僧問玄沙如何是學人自己沙云是你自己師云沒量大人被語脈裏轉卻有僧問如何是學人自己師云忽然路上有人喚衲僧齋你也隨例得飯喫師因齋次拈起糊餅云我秪供養江西兩浙人不供養向北人僧云為什麼秪供養江西兩浙人不供養向北人師云天寒日短兩人共一碗舉國師云南方佛法半生半滅此間身心一如身外無餘師云喚什麼作身心一如又云汝等要識國師底麼自代云不可辜負國師去也舉肅宗帝請國師看戲國師云有什麼身心看戲帝再請國師云幸自好戲師云龍頭蛇尾舉國師三喚侍者侍者三應國師云將謂吾辜負你誰知你辜負吾師云作麼生是吾辜負你處你若會得也是無端又云作麼生是侍者辜負國師處師云粉骨碎身未報得舉藥山問僧什麼處來僧云湖南來山云洞庭湖水滿也未僧云未滿山云許多時雨水為什麼未滿雲巖代云湛湛地洞山代云什麼劫中曾少欠師云秪在這裏舉雪峰云飯籮邊坐餓死人臨河渴死漢玄沙云飯籮裏坐餓死漢水裏沒頭浸渴死漢師云通身是飯通身是水舉僧問資福古人拈捶豎拂意旨如何福云嗄師云雪上加霜舉僧問資福如何是一塵入正受福作入定勢僧云如何是諸塵三昧起福云你問阿誰師云這阿師話墮也不知舉茱萸上堂云你諸人莫向虛空裏釘橛時有靈虛上座出衆云虛空是橛茱萸便打虛云和尚莫錯打某甲萸便歸方丈師云矢上加尖僧云和尚適來與麼道那師云捶鐘謝響得箇蝦蟆出來舉僧問投子密巖意旨如何子云須是與麼人始得趙州云何不與他本分草料師問僧作麼生是本分草料僧擬議師便打舉古云寂寂空形影師展兩手云山河大地何處得也又云一切智通無障礙師云拄杖走到西天卻歸新羅國裏乃敲床云這箇是你鼻孔舉僧問夾山如何是道山云太陽溢目萬里不挂片雲師云不喚作一句不喚作法身是什麼僧問如何是學人自己師云老僧入泥入水僧云某甲粉骨碎身去也師喝云大海水在你頭上速道速道僧無語師代云也知和尚恐某甲不實有時云直得乾坤大地無纖毫過患猶是轉句不見一色始是半提直得如此更須知有全提時節有時云泡幻同無礙一切處不是幻一切處不是無礙有時云橫説豎説菩提涅槃真如佛性總是向下商量直得拈槌豎拂時節亦是橫説豎説對前頭猶較些子僧問請師向上道師云大衆久立速禮三拜舉崇壽問僧還見燈籠麼僧無語師代云推倒燈籠舉趙州問僧什麼處去僧云摘茶去師云閉口舉法身説法青青翠竹盡是法身未是提綱拈掇時節舉有為無三世無為有三世有為是斷滅法何處得三世無為有三世不是守寂處法舉實學是葛藤言句拈槌豎拂時節於實學猶在半途舉三種人一人因説得悟一人因喚得悟第三人見舉便回去你道便回去意作麼生復云也好與三十棒舉法身喫飯早是剜肉作瘡將謂合有與麼説話舉僧問雲居湛然時如何居云不流師云不流説什麼湛然又云此是截鐵之言舉藥病相治盡大地是藥那箇是你自己師云遇賤即貴僧云乞師指示師拍手一下拈起拄杖云接取拄杖子僧接得拗作兩截師云直饒與麼也好與三十棒舉翠巖夏末上堂云我一夏已來與師僧説話看翠巖眉毛在麼保福云作賊人心虛長慶云生也師云閽師有時云不敢望你有逆水之波且有順水之意也難得乃舉良遂初參麻谷谷見來便去鋤草良遂到鋤草處谷都不顧便歸方丈閉卻門良遂連三日去敲門至第三日才敲門麻谷問阿誰良遂云和尚莫瞞良遂若不來禮拜和尚洎被經論賺過一生師云便有逆水之波如今得入是順水之意亦喚作雙放時節又云麻谷問阿誰良遂道莫瞞良遂不是識破麻谷相見時節若不來禮拜和尚洎被經論賺過一生亦知有賺人處自後良遂歸京辭皇帝及左右街大師大德再三相留茶筵次良遂云諸人知處良遂總知良遂知處諸人不知師云作麼生是良遂知處舉心經云無眼耳鼻舌身意師云為你有箇眼見所以言無不可如今見時不可説無也然雖如此見一切有什麼過一切不可得有什麼聲香味觸法舉光明寂照遍河沙問僧豈不是張拙秀才語僧云是師云話墮也舉僧辭石霜霜問船去陸去僧云遇船即船遇陸即陸霜云我道半途稍難僧無語師代云三十年後此話大行又云臨行一句永劫不忘舉生法師云敲空作響擊木無聲師以拄杖空中敲云阿耶耶又敲板頭云作聲麼僧云作聲師云這俗漢又敲板頭云喚什麼作聲舉僧問石霜教中還有祖師意麼霜云有僧云如何是教中祖師意霜云莫向卷中求師代云不得辜負老僧卻向屎坑裏坐地作什麼舉石霜云須知有教外別傳一句僧問如何是教外別傳一句霜云非句師云非句始是句舉洞山云須知有佛向上事僧問如何是佛向上事山云非佛師云名不得狀不得所以言非舉洞山云塵中不染丈夫兒師云拄杖但喚作拄杖一切但喚作一切舉法身清淨一切聲色盡是廉纖語話不涉廉纖作麼生是清淨又云作麼生是法身師云六不收又云三十三天二十八宿舉古云如我身空諸法空千品萬類悉皆同師云身不可得一切諸法豈是有也所以古人道無情有佛性又云無情不喚作法身説法有時云光不透脫有兩般病一切處不明面前有物是一又透得一切法空隱隱地似有箇物相似亦是光不透脫又法身亦有兩般病得到法身為法執不忘己見猶存坐在法身邊是一直饒透得法身去放過即不可子細點檢來有什麼氣息亦是病舉僧問國師如何是本身盧舍那國師云與老僧過淨瓶來僧取淨瓶至國師云卻安舊處著僧送安舊處又來問如何是本身盧舍那國師云古佛過去久矣師云無眹迹舉僧問灌溪久嚮灌溪到來秪見箇漚麻池溪云你秪見漚麻池且不識灌溪僧云如何是灌溪溪云劈箭急師云何不與第一機秪對舉韋監軍見帳子畫牛抵樹問僧牛抵樹樹抵牛無對師代云歸依佛法僧舉老宿問僧聞説雪峰有毬子話是不僧云不見説著宿云聞説有僧云秪是師僧亂舉宿云不亂舉底事作麼生僧無對師代云某甲新到未曾參堂舉佛問外道汝義以何為宗師代外道云者老和尚我識得你也外道云以一切不受為宗代佛云放過一著佛云汝以一切不受為宗耶代外道云者瞿曇莫教失卻問舉雪峰云盡大地是你將謂別更有師云不見楞嚴經云衆生顛倒迷己逐物若能轉物即同如來舉教云諸法寂滅相不可以言宣師云見定如今説話何處有説不説不見道去不到去來不到來舉一切真如含一切師云喚什麼作山河大地又云是諸法空相不生不滅不垢不淨或拈拄杖示衆云拄杖子化為龍吞卻乾坤了也山河大地甚處得來或畫圓相云還有人出得麼舉教云是法住法位世間相常住師云釋迦老子甚處去也舉僧問投子如何是此經子云維摩法華又問塵中不染丈夫兒時如何子云不著師云不喚作法身不喚作第一義亦為説法亦為説真空師齋次拈起匙箸云我不供養南僧秪供養北僧時有僧問為什麼不供養南僧師云我要鈍置供養僧云為什麼秪供養北僧師云一箭兩垛有僧拈問秪如前意作麼生師云好即同榮或時以拄杖打露拄一下云三乘十二分教説得著麼自云説不著復云咄者野狐精僧問秪如師意作麼生師云張公喫酒李公醉舉古云有驚人之句僧問如何是驚人之句師云響舉國師云語漸也返常合道論頓也不留眹迹師云拈捶豎拂彈指時節若檢點來也未是無眹迹有時拈拄杖云乾坤大地殺活總在這裏僧便問如何是殺師云七顛八倒僧云如何是活師云要作飯頭僧云不殺不活時如何師便起云摩訶般若波羅密有時云遇人即途中受用乃拈起拄杖云拄杖不是途説話不是途舉法身喫飯幻化空身即法身師云乾坤大地何處有也物物不可得以空噇空若約點檢來將謂合有與麼説話舉應化非真佛亦非説法者師曰應化之身説即是法身説亦喚作覿體全真以法身喫法身又云飯不是法身拄杖不是法身有時云宗門七縱八橫殺活臨時僧便問如何是殺師云冬去春來僧云冬去春來時如何師云橫擔拄杖東西南北一任打野榸示衆云任你橫説豎説未是宗門苗裔若據宗門苗裔是甚熱碗鳴三乘十二分教説夢達摩西來説夢若有老宿開堂為人説法將利刀殺卻百千萬箇有什麼過又云將謂合有與麼説話底道理一日云拈捶豎拂彈指揚眉一問一答並不當向上宗乘僧便問如何是向上宗乘師云地下閻浮大家總道得秪如鬧市裏坐朝時豬肉案頭𦭘坑裏蟲子還有超佛越祖之談麼僧云有底不肯師云有底不肯不可商量時便有不商量時便無也若約那箇語話體上會事直言未到見解偏枯有時云我尋常道一切聲是佛聲一切色是佛色盡大地是法身枉作箇佛法中見如今見拄杖但喚作拄杖見屋但喚作屋有時云作而無作用而無用乃拈起拄杖云不是用而無用喚什麼作拄杖舉丹霞云百骸俱潰散一物鎮長靈師云拄杖不可不靈也喚什麼作百骸甚處得來舉一切賢聖皆以無為法而有差別師云拄杖不是無為法一切不是無為法舉志公云雞鳴丑一顆圓光明已久師云腦後即不問你三千里外道將一句來舉睦州喚僧趙州喫茶入水之義雪峰輥毬歸宗拽石經頭以字國師水碗羅漢書字諸佛出身處東山水上行總是向上時節示衆云直得觸目無滯達得名身句身一切法空山河大地是名名亦不可得喚作三昧性海俱備猶是無風匝匝之波直得忘知於覺覺即佛性矣喚作無事人更須知有向上一竅在有時云一切處無不是説法打鐘打鼓時不可不是若與麼一切處亦不是有一切處亦不是無又云不可説時即有不説時便無也若約提唱即未在為人門中即得舉生死涅槃合成一塊乃拈起扇子云是什麼不是合成一塊得與麼不靈利直饒與麼也是鬼窟裏作活計舉僧問南泉牛頭未見四祖時為什麼百鳥銜花獻泉云步步踏佛階梯僧云見後為什麼不銜花獻泉云直饒不來猶較王老師一線道師云南泉秪解步步登高不解從空放下僧云如何是步步登高師云香積世界僧云如何是從空放下師云填溝塞壑有時云若問佛法兩字東西南北七縱八橫朝到西天暮歸唐土雖然如此向後不得錯舉舉祖師偈云心隨萬境轉轉處實能幽僧問如何是轉處實能幽師云吃嘹舌頭老僧倒走三千里又問如何是隨流認得性師云饅頭䭔子摩訶般若波羅密舉玄沙與韋監軍茶話次軍云占波國人語話稍難辨何況五天梵語還有人辨得麼玄沙提起托子云識得這箇即辨得師云玄沙何用繁辭又云適來道什麼又云有什麼難辨舉古人云以空名召空色師云拄杖不是空名召得不是空色喚什麼作拄杖不是空名因南泉示衆云自小養一頭水牯牛擬向溪東放不免食他國王水草擬向溪西放不免食他國王水草不如隨處納些些他總不見復有僧舉似師師云南泉水牯牛隨處納些些你道在牛內納牛外納直饒你向這裏説得納處分明我更問你索牛在後長慶云你道古人前頭為人後頭為人舉王大王向雪峰道擬蓋一所佛殿去如何峰云大王何不蓋取一所空王殿大王云請師樣子峰展兩手師云一舉四十九舉報慈讚龍牙偈云日出連山月圓當戶不是無身不欲全露有僧問請師全露龍牙撥開帳子云還見麼僧云不見牙云將眼來後報慈聞舉云龍牙秪道得一半師令僧舉我與你道其僧便舉師云我不妨與你道有時云諸方盡向繩墨裏脫出我者裏即不然僧問未審和尚如何師云草鞋三十文買舉攬真成立色相宛然一切法不遷僧便問作麼生是不遷師云還見燈籠麼僧云見師云靜處薩婆訶示衆云你等諸人每日上來下去問訊即不無若過水時將什麼過有久住僧對云步師深喜之舉僧辭大隨隨問什麼處去僧云峨嵋禮拜普賢去隨拈起拂子云文殊普賢總在者裏其僧畫一圓相拋向背後卻展兩手隨云侍者將一貼茶來與者僧師舉了云我即不與麼有僧云和尚又如何師云西天斬頭截臂者裏自領出去舉黃蘗一日舉手作捏勢云天下老和尚總在者裏我若放一線道從汝七縱八橫若不放過不消一捏僧問放一線道時如何蘗云七縱八橫又問不放過不消一捏時如何蘗云普復有僧問師如何是七縱八橫師云念老僧年老僧云如何是普師云天光回照僧云如何是天光回照師云骼胔少人知有時云一顆圓光明已久還有人問麼僧便問如何是一顆圓光明已久師云西天斬頭截臂又云除卻須彌山拈卻佛殿脊一日披袈裟云我抖擻法身也總無對師云汝問我僧便問和尚抖擻法身意旨如何師云我也知你親舉玄沙示衆云諸方老宿盡道接物利生忽遇三種病人來作麼生接患盲者拈槌豎拂他又不見患聾者語言三昧他又不聞患啞者教伊説又説不得且作麼生接若接此人不得佛法無靈驗有僧請益師師云你禮拜著僧禮拜起師以拄杖便挃僧退後師云你不是患盲復喚近前僧近前師云你不是患聾乃豎起拄杖云還會麼僧云不會師云你不是患啞其僧於此有省舉古云一言才舉大地全收師云且道是什麼言自云春鳥啼時西嶺上遂令僧你問我僧便問是什麼言師云噫舉馬大師云一切語言是提婆宗以此箇為主師云好語秪是無人問僧便問如何是提婆宗師云西天九十六種你是最下種舉肇法師云諸法不異者不可續鳧截鶴夷嶽盈壑然後為無異者哉師云長者天然長短者天然短又云是法住法位世間相常住乃拈起柱杖云拄杖不是常住法舉古云一念劫收一切智師拈起拄杖云乾坤大地總在上頭若透得去拄杖也不見有直饒與麼也是不著便舉須菩提説法帝釋雨華尊者問曰此華從天得耶帝曰弗也從地得耶帝曰弗也從人得耶帝曰弗也從何得耶帝釋舉手尊者云如是如是師云帝釋舉手處作麼生與你四大五蘊釋迦老子同別舉世尊初生下一手指天一手指地周行七步目顧四方云天上天下唯我獨尊師云我當時若見一棒打殺與狗子喫卻貴圖天下太平舉禾山示衆云有作家戰將麼出來時有僧出云未審彼中還有也無師云格舉僧問雪峰佛未出世時如何峰橫按拄杖而坐師云常舉德山問維那有幾人新到那云八人山云喚典座來一時生按過師拈云更説什麼生按過垂示代語舉雪峰勘僧什麼處去僧云識得即知去處峰云你是了事人亂走作什麼僧云莫塗汙人好峰云我即塗汙你古人吹布毛作麼生與我説來看僧云殘羹餿飯已有人喫了也師別前語云築著便作屎臭氣代後語云將謂是鑽天鷂子元來是死水裏蝦蟆舉韶山勘僧云莫便是多口白頭因麼因云不敢山云有多少口因云遍身是山云大小二事向甚處屙因云向韶山口裏屙山云有韶山口即向韶山口裏屙無韶山口向甚處屙因無語山便打師代云這話墮阿師放你三十棒又代云將謂是師子兒又云韶山今日瓦解冰消舉僧到曹溪有守衣鉢上座提起衣云此是大庾嶺頭提不起底僧云為什麼在上座手裏座無語師云彼彼不了師代云遠嚮不如親到又云將謂是師子兒舉睦州問僧莫便是清華嚴麼僧云不敢州云夢見華嚴麼僧無語師云門前大狼籍生舉湖南報慈垂語云我有一句子遍大地僧便問如何是遍大地底句慈云無空缺師云不合與麼道別云何不菴外問舉南泉示衆云昨夜三更文殊普賢相打每人與二十棒趁出院去也趙州出衆云和尚棒教誰喫泉云王老師有什麼過州便禮拜師代云深領和尚慈悲某甲歸衣鉢下得箇安樂舉崇壽見僧做糊餅次隔窗問云你還見我麼僧云不見壽云還我糊餅錢來僧無語師代云和尚禮拜餅爐好舉僧問趙州如何是妙峰頂州云不答你者話僧云為什麼不答州云我若答落在平地師代云俱胝和尚舉長慶見僧來云何得無禮師代云某甲罪過又云甲辰乙巳舉長慶問秀才云佛教云衆生日用而不知儒書亦云日用而不知不知箇什麼秀才云不知大道師云灼然不知舉僧問睦州靈山還有蛇不州云者蚯蚓師代云白骨連山舉長慶拈拄杖云識得這箇一生參學事畢師云識得這箇為什麼不住舉雲巖掃地次道吾云何得太區區生巖云須知有不區區者吾云與麼則第二月也巖豎起掃帚云這箇是第幾月吾拂袖出去師云奴見婢殷勤舉仰山問俗官云官居何位官云推官山乃豎起拂子云還推得這箇麼官無語師代云久嚮和尚舉僧到翠巖值巖不在乃下看主事主事云參見和尚也未僧云未主事卻指狗子云要見和尚但禮拜者狗子僧無語後翠巖歸聞此語云作麼生道免得與麼無語師代云欲觀其師先觀弟子舉座主就華嚴講請翠巖齋巖云山僧有箇問座主若道得即齋巖便拈起糊餅云還具法身麼主云具法身巖云與麼則喫法身也主無語本講座主代云有什麼過巖不肯東使云喏喏師代云特謝和尚降重空筵舉雪峰示衆云世界闊一丈古鏡闊一丈世界闊一尺古鏡闊一尺玄沙指面前火爐云火爐闊多少峰云似古鏡闊沙云這老漢腳跟未點地在後東使拈問僧為復古鏡較火爐與麼大火爐較古鏡與麼大西院云與麼問大也未可在師云餿飯泥茶爐舉僧問雲居山河大地從何而有居云從妄想有僧云與某甲想出一錠金得麼居便休去僧不肯師聞得云已是葛藤不能折合得待伊道想出一鋌金得麼拈拄杖便打舉閩中韋監軍尋常見僧云某甲待官滿出江西湖南置一問問殺江西湖南老宿僧云監軍作麼生問軍云不勞手腳僧無語師代云話墮也又云伏惟尚饗舉王太傅問北院云古人道普現色身遍行三昧佛法為什麼不到北俱盧州院云秪為遍行所以不到師云如法置一問來舉王大尉入佛殿指鉢盂問僧這箇是什麼鉢僧云藥師鉢尉云秪聞有降龍鉢僧云待有龍即降尉云忽遇拿雲擭浪來又作麼生僧云他亦不顧尉云話墮也玄沙云盡你神力走向什麼處去保福云歸依佛法僧百丈作覆鉢勢師云他日生天莫辜負老僧舉地藏問崇壽你久後將什麼利濟於人壽云無不利濟藏云無一法得利濟師云直饒與麼也好喫棒又云當時但喚近前來已後教伊無鵮啄處舉泉州王太傅問僧上座住甚處僧云半月山傅云忽遇月頭月尾又作麼生僧無語師代云將謂與麼更有與麼舉龍牙尋常道雲居師兄得第二句我得第一句西院云秪如龍牙與麼道還扶得也無師云須禮拜雲居始得西院云傍觀者哂舉崇壽問僧還見燈籠麼僧云見壽云兩箇師代云三頭兩面又云七箇八箇
