body:
  text: 機緣雪峰禪師法嗣雲門文偃禪師浙西嘉興張氏子依空王寺志澄律師出家稟具窮律部初參睦州蹤禪師州纔見師來便閉卻門師乃扣門州云誰師云某甲州云作什麼師云己事未明乞師指示州開門一見便閉卻師如是連三日去扣門至第三日州始開門師乃拶入州便擒住云道道師擬議州托開云秦時𨍏轢鑽師從此悟入師到雪峰莊見一僧師問上座今日上山去那僧云是師云寄一則因緣問堂頭和尚秪是不得道是別人語僧云得師云上座到山中見和尚上堂眾纔集便出握腕立地云這老漢項上鐵枷何不脫卻其僧一依師教雪峰見這僧與麼道便下座攔胸把住其僧云速道速道僧無對雪峰托開云不是汝語僧云是某甲語雪峰云侍者將繩棒來僧云不是某語是莊上一浙中上座教某甲來道雪峰云大眾去莊上迎取五百人善知識來師坎日上山雪峰纔見便云因什麼得到與麼地師乃低頭從茲契合師在雪峰時有僧問雪峰如何是觸目不會道運足焉知路峰云蒼天蒼天僧不明遂問師蒼天意旨如何師云三斤麻一疋布僧云不會師云更奉三尺竹後雪峰聞喜云我常疑個布衲師行腳時見一座主舉在天台國清寺齋時雪峰拈缽盂問某道得即與你缽盂某云此是化佛邊事峰云你作座主奴也未得某云不會峰云你問我與你道某始禮拜峰便蹋倒某得七年方見師云是你得七年方見主云是師云更與七年始得師在浙中蘊和尚會裏一日因喫茶次舉蘊和尚垂語云見聞覺知是法法離見聞覺知作麼生有傍僧云見定如今目前一切見聞覺知是法法亦不可得師拍手一下蘊乃舉頭師云猶欠一著在蘊云我到這裏卻不會師到共相共相問什麼處來云雪嶺來相云要急言句舉一則來云前日典座來和尚何不問他相云典座且置師云箭過新羅師在嶺中時問臥龍和尚明己底人還見有己麼龍云不見有己始明得己又問長連床上學得底是第幾機龍云第二機師云作麼生是第一機云緊峭草鞋師在嶺中時有僧問如何是法身向上事云向上與你道即不難汝喚什麼作法身僧云請和尚鑒云鑒即且置作麼生說法身僧云與麼與麼師云此是長連床上學得底我且問你法身還解喫飯麼僧無語後有僧舉似梁家菴主主云雲門直得入泥入水資福云欠一粒也不得剩一粒也不得師在雪峰與長慶西院商量雪峰上堂云盡大地撮來如粟米大拋向面前漆桶不會打鼓普請看西院問師雪峰與麼道還有出頭不得處麼師云有院云作麼生是出頭不得處師云不可總作野狐精見解也又云狼籍不少又云七曜麗天又云南閻浮提北鬱單越師一日與長慶舉趙州無賓主話雪峰當時與一蹋作麼生師云某甲不與麼慶云你作麼生師云石橋在向北師與長慶舉石鞏三平話師云作麼生道免得石鞏喚作半箇聖人慶云若不還價爭辯真偽師云入水見長人師到洞巖巖問作什麼來師云親近來巖云亂走作甚麼師云暫時不在巖云知過即得師云和尚亂走作什麼師到疏山疏山問得力處道將一句來師云請和尚高聲問山便高聲問師云和尚早朝喫粥麼山云作麼生不喫粥師云亂叫喚作麼又因疏山示眾云老僧咸通年己前會得法身邊事咸通年已後會得法身向上事師問承聞和尚咸通年已前會得法身邊事咸通年已後會得法身向上事是不山云是師云如何是法身邊事山云枯椿師云如何是法身向上事山云非枯椿師云還許學人說道理也無山云許你說師云枯椿豈不是明法身邊事非枯椿豈不是明法身向上事山云是師云法身還該一切不山云作麼生不該師指淨瓶云法身還該這箇麼山云闍梨莫向淨瓶邊會師便禮拜師到曹山山示眾云諸方盡把格則何不與他道一轉語教伊莫疑去師便問密密處為什麼不知有山云秪為密密所以不知有師云此人作麼生親近山云不向密密處師云不向密密處還得親近也無山云始得親近師應諾諾師問曹山如何是沙門行云喫常住苗稼者師云便與麼去時如何云你還畜得麼師云學人畜得山云你作麼生畜師云著衣喫飯有什麼難山云何不道披毛戴角師便禮拜因瑫長老舉菩薩手中執赤幡問師作麼生師云你是無禮漢瑫云作麼生無禮師云是你外道奴也作不得師到天童童云你還定當得麼師云和尚道什麼童云不會即目前包褁師云會即目前包褁因見信州鶖湖上堂云莫道未了底人長時浮逼逼地設使了得底人明得知有去處尚乃浮逼逼地師下來舉此語問首座適來和尚示眾云未了底人浮逼逼地了得底人浮逼逼地意作麼生首座云浮逼逼地師云首座在此久住頭白齒黃作這箇語話首座云未審上座又作麼生師云要道即得見即便見若不是莫亂道首座云秪如堂頭道浮逼逼地又作麼生師云頭上著枷腳下著柤座云與麼則無佛法也師云此是文殊普賢大人境界師行腳時有官人問還有定乾坤底句麼師云蘇嚕蘇嚕悉哩薩訶師到江州有陳尚書請師齋相見便問儒書中即不問三乘十二分教自有座主作麼生是衲僧行腳事師云曾問幾人來書云即今問上座師云即今且置作麼生是教意書云黃卷赤軸師云這箇是文字語言作麼生是教意書云口欲談而辭喪心欲緣而慮忘師云口欲談而辭喪為對有言心欲緣而慮忘為對妄想作麼生是教意尚書無語師云見說尚書看法華經是否書云是師云經中道治生產業皆與實相不相違背且道非非想天有幾人退位書無語師云尚書且莫草草十經五論師僧拋卻特入叢林十年二十年尚不奈何尚書又爭得會尚書禮拜云某甲罪過師到歸宗僧問大眾雲集合談何事宗云兩兩三三僧云不會宗云三三兩兩師卻問其僧歸宗意旨如何僧云全體與麼來師云上座曾到潭州龍牙麼僧云曾到來師云打野榸漢師因乾峰上堂云法身有三種病二種光須是一一透得更須知有照用臨時向上一竅在峰乃良久師便出問菴內人為什麼不見菴外事峰呵呵大笑師云猶是學人疑處在峰云子是什麼心行師云也要和尚相委峰云直須與麼始解穩坐地師應喏喏乾峰示眾云舉一不得舉二放過一著落在第二師出眾云昨日有人從天台來卻往經山去峰云典座來日不得普請便下座師問乾峰請師答話峰云到老僧也未師云與麼則學人在遲也峰云與麼那與麼那師云將謂猴白更有猴黑師到灌溪時有僧舉灌溪語云十方無壁落四面亦無門淨裸裸赤灑灑沒可把問師作麼生師云與麼道即易也大難出僧云上座不肯和尚與麼道那師云你適來與麼舉那僧云是師云你驢年夢見灌溪麼僧云某甲話在師云我問你十方無壁落四面亦無門淨裸裸赤灑灑沒可把你道大梵天王與帝釋商量箇什麼事僧云豈干他事師喝云遂隊喫飯漢陳尚書問雲居供養主云雲居高低於弟子主無語尚書問師師云尚書莫教話墮師在嶺中時問一老宿一切時中如何辯明老宿云喚什麼作一切時中師云釋迦老子道了也彌勒猶自不知又見一老宿上堂云若是商量舉覺如當門利劍相似一句下須有殺活始得師出眾云和尚上堂多時大眾歸堂老宿云道什麼師云日月易流師在嶺中順維那處起彼時問古人豎起拂子放下拂子意旨如何維那云拂前見拂後見師云如是如是又云是諾伊是不諾伊又云可知禮也師聞洛浦勘僧云近離甚處僧云荊南浦云有一人與麼去還逢麼僧云不逢浦云為什麼不逢僧云若逢即頭粉碎浦云闍梨三寸甚密師後於江西見其僧問云還肯此語不僧云有師云洛浦倒退三千里師在靈樹知聖大師會中為首座時僧問知聖如何是祖師西來意聖云老僧無語卻問僧忽然上碑合著得什麼語時有數僧下語皆不契聖云汝去請首座來洎師至聖乃舉前話問師師云也不難聖云著得什麼語師云有人問如何是祖師西來意但云師知聖深肯問學人有疑請師不責從上宗乘事作麼師云三拜不虛示眾師上堂良久云夫唱道之機固難諧剖若也一言相契猶是多途況復忉忉有何所益然且教乘之中各有殊分律為戒學經為定學論為慧學三藏五乘五時八教各有所歸然一乘圓頓也大難明直下明得與衲僧天地懸殊若向衲僧門下句裏呈機徒勞佇思門庭敲磕千差萬別擬欲進步向前過在尋佗舌頭路布從上來事合作麼生向者裏道圓道頓得麼者邊那邊得麼莫錯會好莫見與麼道便向不圓不頓處卜度者裏也須是箇人始得莫將依師語相似語測度語到處呈中將為自己見解莫錯會祗如今有什麼事對眾決擇看時有州主何公禮拜問曰弟子請益師云目前無異草有官問佛法如水中月是不師云清波無透路進云和尚從何得師云再問復何來進云正與麼時如何師云重疊關山路有官問千子圍繞何者為的師云化下住持已奉來問問今日開筵將何指教師云來風深辨進云莫秪者便是麼師云錯問從上古德以心傳心今日請師將何施設師云有問有答進云與麼則不虛施設也師云不問不答問凡有言句皆是錯如何是不錯師云當風一句起自何來進云莫秪者便是也無云莫錯問如何是啐啄之機師云響進云還應也無師云且緩緩問如何是學人的的事師云痛領一問問如何是祖師西來意師云日裏看山問如何是和尚家風師云久雨不晴進云如何是久雨不晴師云曬朗著問如何是不帶朕師云天台普請南嶽遊山問如何是向上一路師云九九八十一問如何是教主師云太無禮主問如何是一代時教師云對一說問如何是正法眼師云普問如何是端坐念實相師云河裏失錢河裏摝問如何是沙門行師云會不得進云為什麼會不得師云秪守會不得問如何是尋常之用師云且那裏葛藤去問如何是教意師云你看什麼經僧云般若經師云一切智智清淨還夢見未僧云一切智智清淨且置如何是教意師云心不負人面無慚色放你三十棒問如何是報得四恩三有去師云抱頭哭蒼天問如何是正法眼師云粥飯氣問如何是三昧師云到老僧一問還我一句來問如何是諸佛出身處師云東山水上行問乞師指箇入路師云喫粥喫飯時有僧問如何是一句師云舉問如何是說時默師云清機歷掌進云如何是默時說師云嗄進云不默不說時如何師將棒趁問如何是雲門劍師云祖問如何是諸佛出身處師云更請一問問如何是露地白牛師云覿機無改路進云放著什麼處師云再舉不逾塵問如何是塵塵三昧師云桶裏水缽裏飯問如何是一如體玄師云欠你一問問如何是玄中的師云𡎺進云如何即是師云速退速退妨他別人問問如何是非思量處師云識情難測問鑿壁偷光時如何師云恰問一言道盡時如何師云裂破進云和尚作麼生下手拈掇師云拈取糞箕掃帚來問如何舉唱即得不負來機師云道什麼進云還可來意也無師云且緩緩問如何是透法身句師云北斗裏藏身問如何是本來宗師云不問不答問如何是三界唯心萬法唯識師云我今日不荅話進云為什麼不答話師云驢年會麼問如何是吹毛劍師云骼又云胔問如何是內外光師云向什麼處問學云如何明達師云忽然有人問你作麼生道進云明達後如何師云明即且置還我達來問如何是切急一句師云吃問如何是本來心師云舉起分明問如何是衲僧孔竅師云放過一著進云請師道師云對牛彈琴問如何是大乘修行師云一榼在手問如何是一切智智清淨師云僧堂八佛殿問如何是不挂唇吻一句師云合取狗口問如何是海印三昧師云你但禮拜問著待我東行西行問如何轉動即得不落階級師云南斗七北斗八問如何是當今施設師云道即不難鑒從何來問如何是不睡底眼師云不省問如何是不犯之令師云那箇師僧還見麼問如何是大人相師乃擎拳問如何是佛法大意云一佛二菩薩問如何是兄弟添十字師云我共汝說葛藤問如何是和尚為人一句師云心不負人面無慚色速禮三拜問如何是天然之事師云蹋步向前作什麼問如何是教意師云吃嘹舌頭更將一問來問如何是七縱八橫師云放汝一著上堂云舉一則語教汝直下承當早是撒屎著你頭上也直饒拈一毛頭盡大地一時明得也是剜肉作瘡雖然如此也須是實到者箇田地始得若未且不得掠虛卻須退步向自己腳根下推尋看是什麼道理實無絲髮許與汝作解會與汝作疑惑況汝等且各各當人有一段事大用現前更不煩汝一毫頭氣力便與祖佛無別自是汝諸人信根淺薄惡業濃厚突然起得如許多頭角擔缽囊千鄉萬里受屈作麼且汝諸人有什麼不足處大丈夫漢阿誰無分獨自承當尚猶不著便不可受人欺瞞取人處分纔見老和尚開口便好把特石驀口塞便是屎上青蠅相似鬥咂將去三箇五箇聚頭商量苦屈兄弟古人一期為汝諸人不奈何所以垂一言半句通你入路知是般事拈放一邊自著些子筋骨豈不是有少許相親處快與快與時不待人出息不保入息更有什麼身心閑別處用切須在意珍重上堂良久云觸目不會道運足焉知路僧問如何是觸目菩提師云與我拈卻佛殿問如何是最初一句師云九九八十一僧便禮拜師云近前來僧便近前師便打問如何是實學底事師云大好消息進云畢竟是誰家之子師云臘月二十五問承教有言一切智智清淨時如何師便唾之進云古人方便又作麼生師云來來截卻汝腳跟換卻汝髑髏缽盂裏拈卻匙箸拈卻鼻孔來進云甚處有許多般師云者掠虛漢便打問如何是禪師云是進云如何是道師云得問如何是一切法皆是佛法師云三家村裏老婆盈衢溢路會麼學云不會師云非但汝不會大有人不會在問學人簇簇地商量箇什麼師云大眾久立問如何是諸佛出身處師云佛前裝香佛後合掌問十二時中如何得不被諸境惑去師云三門頭合掌問四面森森如何是靈樹師云風鳴雨息進云如何是靈樹枝條師云曬朗皮草問如何是觸目菩提云拈卻露柱學云露柱豈干他事師云驢年會麼問醍醐上味為什麼翻成毒藥師云𡎺問如何是活師云心不負人學云如何是殺師云三日後不得唱衣學云不殺不活時如何師以拄杖趁出問學人與麼來請師實說師云知問金剛為什麼倒地師云不著力問殺父殺母佛前懺悔殺佛殺祖向什麼處懺悔師云露問不起一念還有過也無師云須彌山問如來唯一說無二說如何是如來說師云那箇師僧何不問問闇中如何辨主師云務原是什麼人坐問學人實問請師實答師云你作麼生辨進云正當與麼時如何師云的問從上古德以何為的師云看取舌頭上堂云諸和尚子莫妄想天是天地是地山是山水是水僧是僧俗是俗良久云與我拈案山來看便有僧問學人見山是山見水是水時如何師云三門為什麼從這裏過進云與麼則不妄想去也師云還我話頭來上堂良久云還有人道得麼道得底出來眾無語師拈拄杖云適來是箇小屎坑如今是箇大屎坑下座問萬法歸一一即不問如何是萬法師云你來這裏說葛藤瞞我問聖僧為什麼被大蟲咬師云與天下人作牓樣問十二時中如何用心即得不負於上來師云省力進云省力事如何師云省取前話問萬機不到處如何知有師云該得麼進云日用事如何師云一箭到新羅大漢國裏說葛藤問學人擬伸一問還許也無師云佛不奪眾生所願問如何舉唱即得不負來機師云痛領一問問千聖功圓冥然時如何擊琢師云句裏明人問三界中何物勝於佛師云通你一問問摘葉尋枝即不問如何是直截根源師云速禮三拜問己事未明如何指示師云不避來機還當得麼問盡其機來師還接也無師云一問不錯學云一問且置師還接不師云細看前話問毘盧向上即不問虛空請師留些子師云把卻汝咽喉你作麼生道問如何是學人自己師云一扠一劄進云莫便是不師云蘇嚕蘇嚕上堂云今日與諸人舉一則語大眾聳聽良久有僧出禮拜擬伸問次師以拄杖趁云似這般滅胡種長連床上納飯阿師堪什麼共語處這般打野榸漢以拄杖一時趁下問大眾雲集合談何事師云向下文長付在來日進云便與麼去時如何師云墮進云什麼處是墮師云長連床上飽喫飯了脫空妄語問靈山一會何似今日師云言中有響學云當今事作麼生師云不煩再問問以字不成八字不是未審是什麼字師云九九八十一進云學人不會請師指示師云我又辜你什麼處問從上古德得箇什麼便稱尊貴師云愛問不愛答進云與麼則不假和尚舌頭嚼去也師云熨斗煎茶銚不同問和尚為人語話還有未道著底句也無師云說不及進云為什麼如此師云秪為如此問大拍盲底人來師還接也無師放身倒問如何是雲門山師云庚峰定穴問牙齒敲磕皆落名言如何得不落古人蹤師云通機自辯問如何是和尚家風師云皮枯骨瘦問如何是道師云七顛八倒進云為什麼如此師云一不得向二不得開問暗室得明時如何師云朗州此去多少上堂云一言纔舉千差同轍該括微塵猶是化門之說若是衲僧合作麼生若將祖意佛意這裏商量曹溪一路平沉還有人道得麼道得底出來時有僧問如何是超佛越祖之談師云餬餅進云這箇有什麼交涉師云灼然有什麼交涉問當今一句請師道師云放你一線道還我一句來問不涉廉纖請師道師云一怕汝不問二怕汝不舉三到老僧勃跳四到你退後速道速道僧便禮拜師便打問目前蕩盡時如何師云熱發作麼其僧禮拜而退師云且來且來僧近前師便棒云這掠虛漢諕我問如何是法王主師云叉手著問盲