路如何體會師云三十年後問槨示雙趺當表何事師云言進云未審師意如何師云緊峭草鞋問不是玄機亦非目擊時如何師云倒一說問劫火洞然時如何師云更夢見甚麼上堂云我共汝平展遇人識人與麼老婆說話尚自不會每日飽飯喫了上來下去覓什麼碗這野狐隊仗向這裏作什麼以拄杖一時趁下問初秋夏末前程忽有人問如何秪對師云大眾退後進云過在什麼處師云還我九十日飯錢來問學人近到法席未審家風事如何師云不歷一問作麼生道問十方國土中唯有一乘法如何是一乘法師云何不別問進云謝師指示師便喝問承古有言一塵遍含一切塵如何是一塵師云吃嘹舌頭更將一問來問學人不問師還答也無師云將汝口挂壁上不得問一切尋常時如何師云雖然屎臭氣熏我我且問你晝行三千夜行八百你缽盂裏什麼處著僧無對師云脫空妄語漢問如何是教眼師云速禮三拜問承古有言牛頭橫說豎說不知有向上關捩子如何是向上關捩子師云東山西嶺青問如何是露地白牛云歸依佛歸依法歸依僧進云白牛何在師咄之問樹凋葉落時如何師云體露金風問如何是布袋裏珍珠師云說得麼問如何是祖宗的子師云言中有響上堂云夫學般若菩薩須識得眾生病即識得學般若菩薩病還有人揀得麼出來對眾揀看眾無語乃云若揀不得莫妨我東行西行上堂云我今日共汝說葛藤屎灰尿火泥豬疥狗不識好惡屎坑裏作活計所以道盡乾坤大地三乘十二分教三世諸佛天下老師言教一時向汝眼睫上會取去饒汝便向這裏一時明得亦是不著便漢無端跳入屎坑可中於我衲僧門下過打腳折時有三僧出一時禮拜師云一狀領過問如何得速超三界去師云如何得速超三界去進云是師云是即休問終日忙忙時如何師云覿機無響路進云作麼生師云說不得問一擺淨盡時如何師云爭柰老僧何進云此是和尚分上師云這掠虛漢問如何是道師云透出一字進云透出後如何師云千里同風問古人道知有極則事如何是極則事師云爭柰在老僧手裏何進云某甲問極則事師便棒云吽吽正當撥破便道請益這般底到處但知亂繞近前來我問你尋常在長連床上商量向上向下超佛越祖你道水牯牛還有超佛越祖底道理麼僧云適來已有人問了也師云這箇是長連床上學得底不要有便言有無便言無僧云若有更披毛戴角作麼師云將知你秪是學語之流又云來來我更問你諸人橫擔拄杖道我參禪學道便覓箇超佛越祖底道理我且問你十二時中行住坐臥屙屎送尿至於茆坑裏蟲子市肆賣買羊肉案頭還有超佛越祖道理麼道得底出來若無莫妨我東行西行便下座師見僧入來便云瓦解冰消僧云學人有什麼過師云七棒對十三問如何是西來意師云長連床上有粥有飯問承古有言道無橫徑立者皆危如何是道師云普請看問如何是三乘教外一句師云闍梨一問老僧勃跳三千里進云謝師指示師云住住你道老僧話作麼生僧無對師云三十年後來與汝三十棒問大眾雲集合談何事師云諕汝屋裏老爺問曹溪一句闔國知聞未審雲門一句什麼人得聞師云闍黎不聞進云學人親近得不師云仔細踟躕看上堂云如來明星現時成道有僧問如何是明星現時成道師云近前來近前來僧近前師以拄杖打趁上堂有僧出禮拜云請師答話師召大眾大眾舉頭師便下座上堂良久有僧出禮拜師云太遲生僧應喏師云這漆桶上堂有解問話者置將一問來僧出禮拜云請師鑒師云拋鉤釣鯤鯨釣得箇蝦蟆云和尚莫錯師云朝走三千暮走八百作麼生僧無語師便打上堂僧問如何是本源師拈起拄杖云若是提起即向上去也僧又問如何是本源師云南贍部洲北鬱單越問普賢為什麼騎象文殊為什麼騎師子師云我無象也無師子且騎佛殿出三門去也問如何是教意師云山河大地又云正好辯猶是曲說教意若約提綱即未在問一切智通無障礙時如何師云掃地潑水相公來問隨流認得性時如何師云東堂月朗西堂闇問如何是三乘教外別傳底事師云你若不問我即不答你若問我即朝到西天暮歸唐土僧云乞師指示師云一不成二不是問如何是祖師西來意師云青天白日寱語作麼問如何是佛法大意師云日裏麒麟看北斗問學人到這裏為什麼道不得師云野狐窟裏坐問不落古今是何曲調師拽拄杖便下座問如何是佛法大意師云面南看北斗問古人斬蛇意旨如何師便打問如何是和尚家風師云闍黎受戒太早問如何是賓中主師云騎一問進云如何是主中主師云叉手著進云賓主相去多少師云如眼如目進云合談何事師云三九二十七問自到和尚法席不會乞師指示師云截卻你頭得麼問乞師指示令學人頓息昏迷師云襄州米作麼價問二尊相見時如何師云不是偶然上堂天帝釋與釋迦老子在中庭裏相爭佛法甚鬧便下座問如何是曹溪的的意師云老僧愛瞋不愛喜進云為什麼如此師云路逢劍客須呈劍不是詩人不獻詩問二尊相見共談何事師云不決即道問人天交接其意如何師云對眾呈機上堂和尚子且須明取衲僧鼻孔且作麼生是衲僧鼻孔乃云摩訶般若波羅密今日大普請便下座問如何是西來意師云山河大地進云向上更有事也無師云有進云如何是向上事云釋迦老子在西天文殊菩薩居東土問父母俱喪時如何云俱喪且置那個是你父母僧云苦痛深師云灼然灼然問如何是大施主師云對機不辯問徹底冥濛底人來師如何拯濟師云兩重公案一狀領過問說教當為何人師云近前來高聲問僧近前問師便打問和尚年多少師云七九六十八進云為什麼七九六十八師云我為你減卻五年問十方薄伽梵一路涅槃門如何是一路涅槃門師云我道不得進云和尚為什麼道不得師云是你舉話即得問如何是法說師云大眾久立速禮三拜如何是隨意說師云晨時有粥齋時有飯如何是隨宜說師云三德六味施佛及僧如何是方便說師云是汝鼻孔重三斤半如何是大悲說師云皈依佛法僧問生死根源即不問如何是目前三昧師云吃嘹舌頭三千里進云今日得遇和尚也師云放你三十棒問乞師指示師云上大人丘乙己進云學人不會師云化三千七十士問不離三德六味還有佛法也無師云秪怕你不問進云請師道師云三德六味施佛及僧上堂云眼睫橫亙十方眉毛上透乾坤下透黃泉須彌山塞卻汝咽喉還有會處麼若會得拽取占波國共新羅國鬥額上堂云江西即說君臣父子湖南即說他不與麼我此間即不如此良久云汝還見壁麼上堂云去去遞相鈍置有什麼了時卻問眾云我與麼道還有過麼問如何是祖師西來意師云一不得問進云喏師咄云話也不領問今日供養羅漢羅漢還來也無師云汝若不問我即不道進云請師道師云三門頭合掌佛殿裏裝香問如何是衲僧本分事師云南有雪峰北有趙州進云請和尚不繁辭師云不得失卻問學云喏師便打問承古有言會即事同一家不會即離牙擘齒如何得事同一家師云亂走作麼上堂云從上來且是個什麼事如今抑不得已且向汝諸人道盡大地有什麼物與汝為對為緣若有針鋒與汝為隔為礙與我拈將來喚什麼作佛作祖喚什麼作山河大地日月星辰將什麼為四大五蘊我與麼道喚作三家村裏老婆說話忽然遇著本色行腳漢聞與麼道把腳拽向階下有什麼罪過雖然如此據箇什麼道理便與麼莫趁口快向這裏亂道須是箇漢始得忽然被老漢腳跟下尋著勿去處打腳折有什麼罪過既與麼如今還有問宗乘中話麼待老漢答一轉了東行西行有僧擬問次師以拄杖劈口打便下座問師子嚬呻時如何師云嚬呻且置試哮吼看僧應喏師云這箇是老鼠啼上堂云我有一句語不敢望你會還有人舉得麼良久云將謂胡鬚赤更有赤鬚胡便下座上堂云不得已且作死馬醫向汝道是箇什麼是東是西是南是北是有是無是見是聞是向上是向下是與麼是不與麼這箇喚作三家村裏老婆說話是你有幾箇到此境界相當即相當不相當靜處薩婆訶便下座上堂云諸方老和尚道須知有聲色外一段事似這箇語話誑諕人家男女三間法堂裏獨自妄想未曾夢見我本師宗旨在作麼生消得他信施臘月三十日箇箇須償他始得任汝勃跳去是你諸人各自努力珍重問目前無一法還免得生死不師云你驢年未免得在問如何是道師云去進云學人不會乞師道師云闍梨公驗分明何在重判問維摩一默還同說也無師云痛領一問進云與麼則同說也師云適來道什麼問如何是清淨法身師云花藥欄進云便與麼會時如何師云金毛師子上堂因聞鐘鳴乃云世界與麼廣闊為什麼鐘聲披七條上堂云不可雪上加霜去也珍重便下座上堂云諸方老禿奴曲木禪床上坐地求名求利問佛答佛問祖答祖屙屎送尿也三家村裏老婆傳口令相似識箇什麼好惡總是這般底水也難消上堂云人人自有光明在看時不見暗昏昏便下座師入京在受春殿聖上問如何是禪師云皇帝有敕臣僧對師在文德殿赴齋有鞠常侍問靈樹果子熟也未師云什麼年中得信道生上堂云你諸人走來這裏覓什麼老僧秪解無端喫飯屙屎別解作什麼你諸方行腳參禪問道我且問你諸方參得底事作麼生試舉看又云中間諕汝屋裏老爺得麼向老漢胐臀後覓得些子涕唾嚼將為自己便道我解禪解道饒你念得一大藏教擬作麼生去古人事不得已見你亂走向汝道菩提涅槃是埋沒你是釘橛繫卻你又見你不會向汝道非菩提涅槃知是般事早是不著便也又更覓他注解這般底滅胡種族從上來總似這般何處到今日我向前行腳時有一般人與我注解他是不惡心被我一日覷見是一場笑具是我三五年不死這般滅胡種底一斧打腳折如今諸方大有出世紐捏你何不去彼中在這裏覓什麼乾屎橛師便下地以拄杖一時打趁下去問如何是萬法一決師云莫教失卻問問死中得活時如何師云朝行三千夜行八百問大眾雲集合談何事師云今日放下令行去也僧禮拜師便打問如何是透法身句師云海晏河清道士問視聽無聲無形老君說了也雲門一句請師指示師云迢然西天路士無語師擬下座士云再請師舉揚宗旨師云道得底出來眾無對師云與麼則辜負請主去也便下座上堂大眾集定師乃拈起拄杖云不得已且向這裏會取看看三門在露柱上便下座師有時顧視僧曰鑒僧擬對之則曰咦叢林因目師為顧鑒咦後德圓明禪師刪去顧字謂之抽顧頌示眾云盡十方世界乾坤大地以拄杖一畫百雜碎三乘十二分教達磨西來放過即不可若不放過不消一喝示眾云西天二十八祖唐土六祖天下老和尚總在拄杖頭上直饒會得倜儻分明秪在半途若不放過盡是野狐精師一日云古來老宿皆為慈悲之故有落草之談隨語識人若是出草之談即不與麼若與麼便有重話會語不見仰山和尚問僧近離甚處僧云廬山仰山云會有五老峰麼僧云不曾遊仰山云闍梨不曾遊山師云此語皆為慈悲之故有落草之談有時云若言即心即佛權且認奴作郎生死涅槃恰似斬頭覓活若說佛說祖佛意祖意大似將木槵子換卻你眼睛相似弟子紹聖朱氏王氏善元如果通珍慧林潘氏念修慧覺
